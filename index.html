<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StudyHub">
<title>UniPort Study Hub</title>

<!-- PWA Manifest inline -->
<link rel="manifest" href="#" id="manifest-placeholder">

<style>
/* ═══════════════════════════════════════════
   UNIPORT STUDY HUB — PWA
   Dark tech theme | Mobile-first
═══════════════════════════════════════════ */
:root {
  --bg:       #0a0e1a;
  --surface:  #111827;
  --card:     #1a2236;
  --border:   #1e3a5f;
  --blue:     #00d4ff;
  --purple:   #7c3aed;
  --green:    #00ff88;
  --red:      #ff4466;
  --yellow:   #ffd700;
  --orange:   #ff8c00;
  --text:     #e2e8f0;
  --muted:    #64748b;
  --radius:   16px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
}

/* ── SCREENS ─────────────────────────────── */
.screen {
  position: fixed;
  inset: 0;
  display: none;
  flex-direction: column;
  background: var(--bg);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  transition: opacity 0.25s ease;
}
.screen.active { display: flex; }

/* ── SPLASH ──────────────────────────────── */
#splash {
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 16px;
  background: var(--bg);
}

.splash-badge {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--blue);
  font-family: monospace;
  background: rgba(0,212,255,0.08);
  border: 1px solid var(--blue);
  border-radius: 100px;
  padding: 6px 16px;
  animation: fadeUp 0.6s ease both;
}

.splash-title {
  font-size: 40px;
  font-weight: 900;
  line-height: 1.1;
  animation: fadeUp 0.7s ease both;
}

.splash-title span {
  background: linear-gradient(135deg, var(--blue), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.splash-sub {
  font-size: 14px;
  color: var(--muted);
  animation: fadeUp 0.8s ease both;
}

.splash-loader {
  width: 48px;
  height: 48px;
  border: 3px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.9s linear infinite, fadeUp 0.9s ease both;
  margin-top: 16px;
}

/* ── HOME ────────────────────────────────── */
#home { padding-bottom: 80px; }

.home-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px 14px;
  position: sticky;
  top: 0;
  z-index: 10;
}

.header-badge {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--blue);
  font-family: monospace;
  margin-bottom: 4px;
}

.header-title {
  font-size: 22px;
  font-weight: 800;
}

.header-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

.section-label {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  font-family: monospace;
  padding: 20px 20px 8px;
}

/* ── COURSE CARD ─────────────────────────── */
.course-card {
  margin: 0 16px 16px;
  background: var(--card);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  overflow: hidden;
  transition: transform 0.15s, border-color 0.2s;
  active: scale(0.98);
}

.course-card:active { transform: scale(0.98); }

.card-top {
  padding: 20px 20px 0;
}

.card-accent-bar {
  height: 3px;
  border-radius: 3px;
  margin-bottom: 14px;
  opacity: 0.7;
}

.card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 6px;
}

.card-emoji {
  font-size: 28px;
  line-height: 1;
}

.card-code {
  font-size: 12px;
  font-weight: 700;
  font-family: monospace;
  letter-spacing: 1px;
  padding: 3px 10px;
  border-radius: 100px;
  background: rgba(255,255,255,0.05);
}

.card-name {
  font-size: 19px;
  font-weight: 800;
  margin-bottom: 8px;
}

.card-topics {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.7;
  margin-bottom: 16px;
}

.card-divider {
  height: 1px;
  background: var(--border);
  margin: 0 -20px;
}

.card-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
}

.card-btn {
  padding: 14px 10px;
  border: none;
  background: transparent;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: background 0.15s;
  border-radius: 0;
}

.card-btn:active { background: rgba(255,255,255,0.05); }

.card-btn.quiz-btn {
  color: #000;
  font-weight: 700;
}

.card-btn-divider {
  width: 1px;
  background: var(--border);
}

.card-btn.notes-btn { color: var(--muted); }
.card-btn.notes-btn:not(.has-notes) { opacity: 0.4; }

/* ── INSTALL BANNER ──────────────────────── */
.install-banner {
  margin: 0 16px 16px;
  background: rgba(0,212,255,0.06);
  border: 1px solid rgba(0,212,255,0.25);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.install-banner .install-icon { font-size: 24px; }

.install-info { flex: 1; }

.install-info strong {
  font-size: 13px;
  color: var(--blue);
  display: block;
  margin-bottom: 2px;
}

.install-info span {
  font-size: 11px;
  color: var(--muted);
}

.install-btn {
  background: var(--blue);
  color: #000;
  border: none;
  border-radius: 100px;
  padding: 8px 16px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
}

/* ── QUIZ / NOTES SCREEN ─────────────────── */
.sub-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 10;
  flex-shrink: 0;
}

.back-btn {
  background: rgba(0,212,255,0.08);
  border: 1px solid var(--blue);
  color: var(--blue);
  border-radius: 100px;
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  font-family: inherit;
}

.back-btn:active { background: rgba(0,212,255,0.18); }

.sub-title-wrap { flex: 1; min-width: 0; }

.sub-title {
  font-size: 15px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.sub-sub {
  font-size: 11px;
  color: var(--muted);
}

/* ── QUIZ FRAME ──────────────────────────── */
#quiz-screen {
  overflow: hidden;
}

#quiz-frame {
  flex: 1;
  border: none;
  width: 100%;
  background: var(--bg);
}

/* ── NOTES SCREEN ────────────────────────── */
#notes-screen {
  overflow: hidden;
}

.notes-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.notes-tab-bar {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.notes-tab {
  flex: 1;
  padding: 12px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}

.notes-tab.active {
  color: var(--blue);
  border-bottom-color: var(--blue);
}

#pdf-frame {
  flex: 1;
  border: none;
  width: 100%;
  background: #fff;
}

.no-pdf {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 24px;
  gap: 12px;
}

.no-pdf .no-pdf-icon { font-size: 48px; }
.no-pdf h3 { font-size: 18px; color: var(--yellow); }
.no-pdf p { font-size: 13px; color: var(--muted); line-height: 1.6; }
.no-pdf code { 
  background: var(--card); 
  color: var(--blue); 
  padding: 2px 8px; 
  border-radius: 6px; 
  font-size: 12px; 
}

/* ── BOTTOM NAV ──────────────────────────── */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
}

.nav-btn {
  flex: 1;
  padding: 10px 4px 8px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: inherit;
  font-size: 10px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  transition: color 0.2s;
}

.nav-btn.active { color: var(--blue); }
.nav-btn .nav-icon { font-size: 20px; line-height: 1; }

/* ── ANIMATIONS ──────────────────────────── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ── TOAST ───────────────────────────────── */
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 20px;
  border-radius: 100px;
  font-size: 13px;
  z-index: 999;
  opacity: 0;
  transition: all 0.3s;
  white-space: nowrap;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── SCROLLBAR ───────────────────────────── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════
     SPLASH SCREEN
═══════════════════════════════════════ -->
<div id="splash" class="screen active">
  <div class="splash-badge">◈ &nbsp; UNIVERSITY OF PORT HARCOURT</div>
  <div class="splash-title">UniPort<br><span>Study Hub</span></div>
  <div class="splash-sub">Your exam preparation companion</div>
  <div class="splash-loader"></div>
</div>

<!-- ═══════════════════════════════════════
     HOME SCREEN
═══════════════════════════════════════ -->
<div id="home" class="screen">

  <div class="home-header">
    <div class="header-badge">◈ &nbsp; UNIPORT STUDY HUB</div>
    <div class="header-title">Dashboard</div>
    <div class="header-sub" id="course-count">Loading courses...</div>
  </div>

  <!-- Install to home screen banner -->
  <div class="install-banner" id="install-banner" style="display:none">
    <span class="install-icon">📲</span>
    <div class="install-info">
      <strong>Add to Home Screen</strong>
      <span>Access like a real app — works offline!</span>

    <button class="install-btn" onclick="installApp()">Install</button>

  <div class="bottom-nav">
    <button class="nav-btn active" onclick="showHome()">
      <span class="nav-icon">🏠</span>
      <span>Home</span>
    </button>
    <button class="nav-btn" id="nav-about" onclick="showToast('UniPort Study Hub v1.0 — Built for Godswill 💪')">
      <span class="nav-icon">ℹ️</span>
      <span>About</span>
    </button>
  </div>
</div>

<!-- ═══════════════════════════════════════
     QUIZ SCREEN
═══════════════════════════════════════ -->
<div id="quiz-screen" class="screen">
  <div class="sub-header">
    <button class="back-btn" onclick="leaveQuiz()">← Back</button>
    <div class="sub-title-wrap">
      <div class="sub-title" id="quiz-title">CBT Quiz</div>
      <div class="sub-sub" id="quiz-sub"></div>
    </div>
  </div>
  <iframe id="quiz-frame" title="CBT Quiz"></iframe>
</div>

<!-- ═══════════════════════════════════════
     NOTES SCREEN
═══════════════════════════════════════ -->
<div id="notes-screen" class="screen">
  <div class="sub-header">
    <button class="back-btn" onclick="showScreen('home')">← Back</button>
    <div class="sub-title-wrap">
      <div class="sub-title" id="notes-title">Study Notes</div>
      <div class="sub-sub" id="notes-sub"></div>
    </div>
  </div>

  <div class="notes-body">
    <div id="pdf-container" style="flex:1;display:flex;flex-direction:column;overflow:hidden"></div>
  </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
//
//   ╔══════════════════════════════════════════════════════════════╗
//   ║           HOW TO ADD A NEW COURSE — READ THIS!              ║
//   ╠══════════════════════════════════════════════════════════════╣
//   ║                                                              ║
//   ║  1. Copy the course block below (the { } object)            ║
//   ║  2. Paste it inside the courses array                        ║
//   ║  3. Fill in:                                                 ║
//   ║     - code:      "CSC 201"                                   ║
//   ║     - name:      "Programming in Java"                       ║
//   ║     - emoji:     any emoji                                   ║
//   ║     - topics:    list of topics                              ║
//   ║     - accent:    any CSS color                               ║
//   ║     - quizFile:  filename of your quiz HTML (or null)        ║
//   ║     - notesFile: filename of your PDF (or null)              ║
//   ║                                                              ║
//   ║  4. Drop your quiz .html file in the same folder as this app ║
//   ║  5. Drop your PDF file in the same folder as this app        ║
//   ║  6. Done! Open the app and your course appears automatically ║
//   ║                                                              ║
//   ╚══════════════════════════════════════════════════════════════╝
//
// ═══════════════════════════════════════════════════════════════════════════

const courses = [

  // ── COURSE 1: IFT 211 ─────────────────────────────────────────────────────
  {
    code:      "IFT 211",
    name:      "Digital Logic Design",
    emoji:     "⚡",
    topics:    "Data Representation · Number Systems\nLogic Gates · Boolean Algebra\nBinary Arithmetic · Flip-Flops\nInstruction Cycle · Computer Architecture",
    accent:    "#00d4ff",
    quizFile:  "IFT211_CBT_Quiz.html",    // ← quiz HTML filename (same folder as this file)
    notesFile: "IFT211_Digital_Logic_Design_Notes.pdf",                  // ← PDF filename or null if no PDF yet
  },

  // ── COURSE 2: CSC 203.1 ───────────────────────────────────────────────────
  {
    code:      "CSC 203.1",
    name:      "Discrete Structures",
    emoji:     "∑",
    topics:    "Set Theory · Mathematical Logic\nProofs & Induction · Graph Theory\nBoolean Algebra · Matrices\nCounting · Probability Generating Functions",
    accent:    "#7c3aed",
    quizFile:  "CSC203_Discrete_Structures_CBT.html",            // ← quiz HTML filename
    notesFile: "CSC203_Discrete_Structures_Notes.pdf",  // ← PDF filename
  },

  // ── COURSE 2: CSC 201.1 ───────────────────────────────────────────────────
  {
    code:      "CSC 201.1",
    name:      "Computer Programming 1",
    emoji:     "🖥️",
    topics:    "Introduction to java programming . Java Data types . Conditional Statements",
    accent:    "#84cc16",
    quizFile:  "CSC201_CBT_Quiz.html", 
    notesFile: "CSC201_Computer_Programming_Java.pdf",
  },

  // ── COURSE 2: CSC 286.1 ───────────────────────────────────────────────────
  {
    code:      "CSC 286.1",
    name:      "Cloud Computing",
    emoji:     "☁️",
    topics:    "Introduction to Cloud computing . Cloud programming fundamentals . Cloud development and deployment essentials",
    accent:    "#f97316",
    quizFile:  "csc281_quiz.html", 
    notesFile: "CSC201_Cloud_computing_Notes.pdf",
  },

  // ── COURSE 2: COS 270.1 ───────────────────────────────────────────────────
  {
    code:      "CSC 270.1",
    name:      "UI/UX",
    emoji:     "📴",
    topics:    "Human computer interaction . Graphic user interface . Colour theorem",
    accent:    "#fb923c",
    quizFile:  "CSC270_CBT_Quiz-1.html", 
    notesFile: "CSC270_UI_UX_Notes-2.pdf",
  },

  // ── COURSE 2: COS 238.1 ───────────────────────────────────────────────────
  {
    code:      "COS 238.1",
    name:      "VB.Net",
    emoji:     "👨‍💻",
    topics:    "Introductiob into Object oriented programming . Introduction to GUI",
    accent:    "#ef4444",
    quizFile:  "csc201_quiz.html", 
    notesFile: "CSC201_Computer_Programming_Notes.pdf",
  },

  // ── COURSE 2: MTH 201.1 ───────────────────────────────────────────────────
  {
    code:      "MTH 201.1",
    name:      "Mathemathical methods",
    emoji:     "#",
    topics:    "Introduction to java programming . Java Data types . Conditional Statements",
    accent:    "#00d4ff",
   // quizFile:  "csc201_quiz.html", 
    notesFile: "CSC201_Computer_Programming_Notes.pdf",
  },

  // ── COURSE 2: CSC 281.1 ───────────────────────────────────────────────────
  {
    code:      "CSC 281.1",
    name:      "Introduction to cyber security",
    emoji:     "#",
    topics:    "Introduction to java programming . Java Data types . Conditional Statements",
    accent:    "#94a3b8",
    quizFile:  "CSC281_CBT_Quiz.html", 
    notesFile: "CSC281_Intro_Cyber_Technologies_Notes.pdf",
  },

  // ── ADD NEW COURSE HERE ───────────────────────────────────────────────────
  // Just copy and paste this block and fill in your details:
  //
  // {
  //   code:      "CSC 201",
  //   name:      "Programming in Java",
  //   emoji:     "☕",
  //   topics:    "OOP · Classes · Inheritance\nInterfaces · Collections · Exceptions",
  //   accent:    "#00ff88",
  //   quizFile:  "csc201_quiz.html",
  //   notesFile: "csc201_notes.pdf",
  // },

];

// ═══════════════════════════════════════════════════════════════════════════
//  APP LOGIC — you don't need to edit below this line
// ═══════════════════════════════════════════════════════════════════════════

let deferredInstallPrompt = null;
let currentQuizFile = null;

// ── PWA Install prompt ─────────────────────────────────────────────────────
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  document.getElementById('install-banner').style.display = 'flex';
});

function installApp() {
  if (deferredInstallPrompt) {
    deferredInstallPrompt.prompt();
    deferredInstallPrompt.userChoice.then(() => {
      deferredInstallPrompt = null;
      document.getElementById('install-banner').style.display = 'none';
    });
  } else {
    showToast('Open browser menu → "Add to Home Screen"');
  }
}

// ── Screen navigation ──────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showHome() { showScreen('home'); }

// ── Build course cards ─────────────────────────────────────────────────────
function buildCourseList() {
  const container = document.getElementById('course-list');
  container.innerHTML = '';

  courses.forEach((course, i) => {
    const hasNotes = !!course.notesFile;
    const hasQuiz  = !!course.quizFile;

    const card = document.createElement('div');
    card.className = 'course-card';
    card.style.borderColor = course.accent + '44';
    card.innerHTML = `
      <div class="card-top">
        <div class="card-accent-bar" style="background:${course.accent}"></div>
        <div class="card-header">
          <span class="card-emoji">${course.emoji}</span>
          <span class="card-code" style="color:${course.accent}">${course.code}</span>
        </div>
        <div class="card-name">${course.name}</div>
        <div class="card-topics">${course.topics.replace(/\n/g,'<br>')}</div>
      </div>
      <div class="card-divider"></div>
      <div class="card-actions">
        <button class="card-btn quiz-btn" 
                style="background:${hasQuiz ? course.accent : '#333'}"
                onclick="openQuiz(${i})"
                ${!hasQuiz ? 'disabled' : ''}>
          ${hasQuiz ? '▶ Start Quiz' : '⏳ Quiz Soon'}
        </button>
        <div class="card-btn-divider"></div>
        <button class="card-btn notes-btn ${hasNotes ? 'has-notes' : ''}"
                onclick="openNotes(${i})">
          📄 ${hasNotes ? 'View Notes' : 'Notes Soon'}
        </button>
      </div>
    `;
    container.appendChild(card);
  });

  document.getElementById('course-count').textContent =
    courses.length + ' Course' + (courses.length !== 1 ? 's' : '') + ' Available';
}

// ── Open Quiz ──────────────────────────────────────────────────────────────
function openQuiz(index) {
  const course = courses[index];
  if (!course.quizFile) { showToast('Quiz coming soon!'); return; }

  document.getElementById('quiz-title').textContent = course.code + '  —  CBT Quiz';
  document.getElementById('quiz-sub').textContent   = course.name;
  document.getElementById('quiz-frame').src = course.quizFile;
  currentQuizFile = course.quizFile;
  showScreen('quiz-screen');
}

function leaveQuiz() {
  if (confirm('Leave quiz? Your progress will be lost.')) {
    document.getElementById('quiz-frame').src = 'about:blank';
    showScreen('home');
  }
}

// ── Open Notes ─────────────────────────────────────────────────────────────
function openNotes(index) {
  const course = courses[index];

  document.getElementById('notes-title').textContent = course.code + '  —  Study Notes';
  document.getElementById('notes-sub').textContent   = course.name;

  const container = document.getElementById('pdf-container');

  if (!course.notesFile) {
    container.innerHTML = `
      <div class="no-pdf">
        <div class="no-pdf-icon">📄</div>
        <h3>Notes Coming Soon</h3>
        <p>Notes for <strong>${course.code}</strong> haven't been added yet.<br><br>
        To add notes later, drop your PDF in the same folder as this app,
        then set <code>notesFile: "yourfile.pdf"</code> in the courses list.</p>
      </div>`;
  } else {
    container.innerHTML = `
      <iframe id="pdf-frame" 
              src="${course.notesFile}" 
              title="Study Notes"
              style="flex:1;border:none;width:100%;height:100%;background:#fff">
      </iframe>`;
  }

  showScreen('notes-screen');
}

// ── Toast notification ─────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Splash → Home ──────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  buildCourseList();
  setTimeout(() => showScreen('home'), 2000);
});

// ── Service Worker registration (offline support) ──────────────────────────
if ('serviceWorker' in navigator) {
  // Inline service worker as a blob
  const swCode = `
    const CACHE = 'studyhub-v1';
    const ASSETS = ['./', 'ift211_quiz.html', 'csc203_quiz.html'];

    self.addEventListener('install', e => {
      e.waitUntil(
        caches.open(CACHE).then(c => {
          return Promise.allSettled(ASSETS.map(a => c.add(a).catch(() => {})));
        })
      );
    });

    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).catch(() =>
          new Response('Offline', {status: 503})
        ))
      );
    });
  `;

  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swURL = URL.createObjectURL(blob);

  navigator.serviceWorker.register(swURL).catch(() => {});
}

// ── Dynamic manifest for PWA ───────────────────────────────────────────────
const manifest = {
  name: "UniPort Study Hub",
  short_name: "StudyHub",
  description: "UniPort exam preparation — CBT quizzes and study notes",
  start_url: "./",
  display: "standalone",
  background_color: "#0a0e1a",
  theme_color: "#0a0e1a",
  icons: [{
    src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230a0e1a'/><text y='68' x='50' text-anchor='middle' font-size='55'>📚</text></svg>",
    sizes: "512x512",
    type: "image/svg+xml",
    purpose: "any maskable"
  }]
};

const manifestBlob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
const manifestURL  = URL.createObjectURL(manifestBlob);
const link = document.createElement('link');
link.rel  = 'manifest';
link.href = manifestURL;
document.head.appendChild(link);
</script>
